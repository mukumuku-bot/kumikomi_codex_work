<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>音源方向推定</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Smartphone Sound Bearing</p>
          <h1>音源方向推定</h1>
        </div>
        <button id="startButton" class="primary-button" type="button">
          <span aria-hidden="true">▶</span>
          測定開始
        </button>
      </section>

      <section class="status-grid" aria-label="測定状態">
        <div class="status-tile">
          <span class="label">推定方向</span>
          <strong id="bearingText">--</strong>
          <small id="confidenceText">信頼度 --</small>
        </div>
        <div class="status-tile">
          <span class="label">音量</span>
          <strong id="levelText">-- dB</strong>
          <div class="meter" aria-hidden="true"><span id="levelBar"></span></div>
        </div>
        <div class="status-tile">
          <span class="label">左右差</span>
          <strong id="balanceText">--</strong>
          <small id="inputState">マイク待機中</small>
        </div>
      </section>

      <section class="compass-panel" aria-label="方向表示">
        <div class="compass" id="compass">
          <div class="ring"></div>
          <span class="mark north">前</span>
          <span class="mark east">右</span>
          <span class="mark south">後</span>
          <span class="mark west">左</span>
          <div class="sweep" id="sweep"></div>
          <div class="needle" id="needle"></div>
          <div class="phone" aria-hidden="true"></div>
        </div>
      </section>

      <section class="controls" aria-label="測定操作">
        <button id="resetButton" class="secondary-button" type="button">リセット</button>
        <label class="toggle">
          <input id="holdToggle" type="checkbox" />
          <span>推定を保持</span>
        </label>
      </section>

      <section class="notes" aria-label="使い方">
        <h2>測り方</h2>
        <ol>
          <li>スマホを動かさずに「測定開始」を押します。</li>
          <li>マイクをふさがないように、画面を音源のほうへ向けます。</li>
          <li>入力がステレオ扱いの端末では、左右差から大雑把に左・正面付近・右を表示します。</li>
        </ol>
        <p>
          多くのブラウザはスマホの複数マイクを単一チャンネルにまとめます。その場合、静止したままの方向推定はできないため「方向不明」と表示します。
        </p>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
