<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>人物中心ズレ検知</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Smartphone Person Detector</p>
          <h1>人物中心ズレ検知</h1>
        </div>
        <button id="startButton" class="primary-button" type="button">
          <span aria-hidden="true">▶</span>
          カメラ開始
        </button>
      </section>

      <section class="camera-panel" aria-label="カメラ映像">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="overlay"></canvas>
        <div class="center-guide" aria-hidden="true">
          <span class="horizontal"></span>
          <span class="vertical"></span>
          <span class="target"></span>
        </div>
        <div id="dogEyes" class="dog-eyes" aria-hidden="true">
          <span class="brow left-brow"></span>
          <span class="brow right-brow"></span>
          <span class="eye left-eye">
            <span class="pupil"></span>
          </span>
          <span class="eye right-eye">
            <span class="pupil"></span>
          </span>
          <span class="muzzle"></span>
        </div>
        <div id="loadingState" class="loading-state">カメラ待機中</div>
      </section>

      <section class="readout-grid" aria-label="検知結果">
        <div class="readout-tile main-readout">
          <span class="label">中心からのズレ</span>
          <strong id="offsetText">--%</strong>
          <small id="directionText">人物を検知すると表示します</small>
        </div>
        <div class="readout-tile">
          <span class="label">横方向</span>
          <strong id="xOffsetText">--%</strong>
          <small id="xDirectionText">--</small>
        </div>
        <div class="readout-tile">
          <span class="label">縦方向</span>
          <strong id="yOffsetText">--%</strong>
          <small id="yDirectionText">--</small>
        </div>
        <div class="readout-tile">
          <span class="label">検知人数</span>
          <strong id="personCountText">0</strong>
          <small id="confidenceText">信頼度 --</small>
        </div>
      </section>

      <input id="mirrorToggle" type="checkbox" checked hidden />
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
