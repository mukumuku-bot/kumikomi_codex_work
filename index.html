<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101828" />
    <title>組み込みデモ一覧</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="home-shell">
      <section class="intro" aria-labelledby="pageTitle">
        <p class="eyebrow">Embedded Web Demos</p>
        <h1 id="pageTitle">組み込みデモ一覧</h1>
        <p class="lead">
          人物検知と文字起こし系の機能を別ページに整理しました。GitHub Pagesでは、この入口からそれぞれのURLへ移動できます。
        </p>
      </section>

      <nav class="demo-grid" aria-label="デモページ">
        <a class="demo-card person-card" href="./person-detection/">
          <span class="demo-icon" aria-hidden="true">◎</span>
          <span class="demo-body">
            <span class="demo-label">Camera</span>
            <strong>人物中心ズレ検知</strong>
            <span>スマホのカメラで人物を検知し、画面中央からのズレに合わせて目が追従します。</span>
          </span>
          <span class="demo-action">開く</span>
        </a>

        <a class="demo-card sound-card" href="./sound-transcription/">
          <span class="demo-icon" aria-hidden="true">♪</span>
          <span class="demo-body">
            <span class="demo-label">Speech</span>
            <strong>スマホ文字起こし</strong>
            <span>スマホのマイクで話した内容を、その場でテキストにします。</span>
          </span>
          <span class="demo-action">開く</span>
        </a>
      </nav>
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistration("./").then((registration) => {
          if (registration) registration.unregister();
        });
      }
    </script>
  </body>
</html>
