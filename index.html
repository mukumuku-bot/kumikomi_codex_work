<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>人物中心ズレ検知</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Smartphone Person Detector</p>
          <h1>人物中心ズレ検知</h1>
        </div>
        <button id="startButton" class="primary-button" type="button">
          <span aria-hidden="true">▶</span>
          カメラ開始
        </button>
      </section>

      <section class="eye-stage" aria-label="追従する目">
        <svg
          id="dogEyes"
          class="dog-eyes"
          viewBox="0 0 320 170"
          role="img"
          aria-label="人を追いかける犬風の目"
        >
          <rect x="10" y="8" width="300" height="150" rx="58" fill="#8b5a3c" stroke="#f8efe3" stroke-width="5" />
          <path d="M32 44 C58 20, 98 21, 124 47" fill="none" stroke="#3a2418" stroke-width="14" stroke-linecap="round" />
          <path d="M196 47 C222 21, 262 20, 288 44" fill="none" stroke="#3a2418" stroke-width="14" stroke-linecap="round" />
          <ellipse cx="96" cy="86" rx="50" ry="42" fill="#fff7ea" stroke="#3a2418" stroke-width="5" />
          <ellipse cx="224" cy="86" rx="50" ry="42" fill="#fff7ea" stroke="#3a2418" stroke-width="5" />
          <g id="pupilGroup">
            <ellipse cx="96" cy="90" rx="18" ry="23" fill="#1b1410" />
            <ellipse cx="224" cy="90" rx="18" ry="23" fill="#1b1410" />
            <circle cx="88" cy="80" r="6" fill="#ffffff" />
            <circle cx="216" cy="80" r="6" fill="#ffffff" />
          </g>
          <ellipse cx="160" cy="132" rx="19" ry="13" fill="#2b1a12" />
        </svg>
      </section>

      <section class="camera-panel" aria-label="カメラ映像">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="overlay"></canvas>
        <div class="center-guide" aria-hidden="true">
          <span class="horizontal"></span>
          <span class="vertical"></span>
          <span class="target"></span>
        </div>
        <div id="loadingState" class="loading-state">カメラ待機中</div>
      </section>

      <section class="readout-grid" aria-label="検知結果">
        <div class="readout-tile main-readout">
          <span class="label">中心からのズレ</span>
          <strong id="offsetText">--%</strong>
          <small id="directionText">人物を検知すると表示します</small>
        </div>
        <div class="readout-tile">
          <span class="label">横方向</span>
          <strong id="xOffsetText">--%</strong>
          <small id="xDirectionText">--</small>
        </div>
        <div class="readout-tile">
          <span class="label">縦方向</span>
          <strong id="yOffsetText">--%</strong>
          <small id="yDirectionText">--</small>
        </div>
        <div class="readout-tile">
          <span class="label">検知人数</span>
          <strong id="personCountText">0</strong>
          <small id="confidenceText">信頼度 --</small>
        </div>
      </section>

      <input id="mirrorToggle" type="checkbox" checked hidden />
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
