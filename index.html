<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>人物中心ズレ検知</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="eye-stage" aria-label="追従する目">
        <svg
          id="dogEyes"
          class="dog-eyes"
          viewBox="0 0 320 170"
          role="img"
          aria-label="人を追いかける犬風の目"
        >
          <path d="M32 44 C58 20, 98 21, 124 47" fill="none" stroke="#3a2418" stroke-width="14" stroke-linecap="round" />
          <path d="M196 47 C222 21, 262 20, 288 44" fill="none" stroke="#3a2418" stroke-width="14" stroke-linecap="round" />
          <ellipse cx="96" cy="86" rx="50" ry="42" fill="#fff7ea" stroke="#3a2418" stroke-width="5" />
          <ellipse cx="224" cy="86" rx="50" ry="42" fill="#fff7ea" stroke="#3a2418" stroke-width="5" />
          <g id="pupilGroup">
            <ellipse cx="96" cy="90" rx="18" ry="23" fill="#1b1410" />
            <ellipse cx="224" cy="90" rx="18" ry="23" fill="#1b1410" />
            <circle cx="88" cy="80" r="6" fill="#ffffff" />
            <circle cx="216" cy="80" r="6" fill="#ffffff" />
          </g>
          <g class="blink-lids">
            <rect class="lid top-lid left-lid" x="46" y="48" width="100" height="26" rx="15" fill="#6f452e" />
            <rect class="lid top-lid right-lid" x="174" y="48" width="100" height="26" rx="15" fill="#6f452e" />
            <rect class="lid bottom-lid left-lid" x="46" y="98" width="100" height="26" rx="15" fill="#6f452e" />
            <rect class="lid bottom-lid right-lid" x="174" y="98" width="100" height="26" rx="15" fill="#6f452e" />
          </g>
          <ellipse cx="160" cy="132" rx="19" ry="13" fill="#2b1a12" />
        </svg>
      </section>

      <button id="startButton" class="camera-start" type="button" aria-label="カメラ開始"></button>
      <video id="video" class="hidden-camera" playsinline muted autoplay></video>
      <canvas id="overlay" class="hidden-camera"></canvas>
      <div id="loadingState" class="visually-hidden">カメラ待機中</div>
      <div id="offsetText" class="visually-hidden">--%</div>
      <div id="directionText" class="visually-hidden">人物を検知すると表示します</div>
      <div id="xOffsetText" class="visually-hidden">--%</div>
      <div id="yOffsetText" class="visually-hidden">--%</div>
      <div id="xDirectionText" class="visually-hidden">--</div>
      <div id="yDirectionText" class="visually-hidden">--</div>
      <div id="personCountText" class="visually-hidden">0</div>
      <div id="confidenceText" class="visually-hidden">信頼度 --</div>
      <input id="mirrorToggle" type="checkbox" checked hidden />
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
