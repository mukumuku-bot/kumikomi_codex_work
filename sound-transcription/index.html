<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101828" />
    <title>スマホ文字起こし</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=iphone-dictation-2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="pageTitle">
        <p class="eyebrow">Speech To Text</p>
        <h1 id="pageTitle">スマホ文字起こし</h1>
        <p class="lead">スマホのマイクで話した内容を、その場でテキストにします。</p>
      </section>

      <section class="transcription-panel" aria-label="文字起こし">
        <div class="status-row">
          <span id="transcriptionStatus" class="status-pill">端末入力</span>
          <select id="languageSelect" aria-label="文字起こし言語">
            <option value="ja-JP">日本語</option>
            <option value="en-US">English</option>
          </select>
        </div>

        <div class="record-grid">
          <button id="transcribeButton" class="record-button" type="button">
            <span aria-hidden="true"></span>
            文字起こし開始
          </button>
          <button id="stopButton" class="stop-button" type="button" disabled>停止</button>
        </div>

        <textarea
          id="transcriptText"
          class="transcript-box"
          inputmode="text"
          placeholder="ここに文字起こし結果が表示されます"
        ></textarea>

        <div class="action-grid" aria-label="文字起こし操作">
          <button id="copyTranscriptButton" class="secondary-button" type="button">コピー</button>
          <button id="downloadTranscriptButton" class="secondary-button" type="button">保存</button>
          <button id="clearTranscriptButton" class="secondary-button danger-button" type="button">消去</button>
        </div>

        <p id="transcriptionHelp" class="help-text">
          文字起こし開始を押して、マイクの使用を許可してください。iPhoneで開始できない場合は入力欄をタップし、キーボードのマイクボタンを使ってください。
        </p>
      </section>
    </main>

    <script src="./app.js?v=recognition-loop-1" type="module"></script>
  </body>
</html>
